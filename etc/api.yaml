Name: meme-api
Host: 0.0.0.0
Port: 38080

Log:
  Level: info
  Mode: console

# JWT配置
Auth:
  AccessSecret: your-access-secret-key-change-in-production
  AccessExpire: 86400  # 24小时
  RefreshExpire: 604800  # 7天

# 数据库配置
Database:
  Host: 127.0.0.1
  Port: 5432
  User: postgres
  Password: "123456"
  Name: metaland
  SSLMode: disable
  MaxOpenConns: 50
  MaxIdleConns: 10

# Redis配置
Redis:
  Host: localhost:6379
  Pass: ""
  DB: 0

# 链配置
Chain:
  Name: BSC Testnet
  ChainID: 97
  RPC: https://bsc-testnet.infura.io/v3/32561b86f94b4d2d9c4218d027c3caf4
  CoreContract: "0x69207F321CFDfd30D73D1d9278e4132E15080ec9"
  FactoryContract: "0x7A24756A156DE5752a2d91d494D2D4FdCc9fc18F"
  HelperContract: "0xbdBA43Fa0DF71724E5fF171eD3F4781ece0c141A"
  VestingContract: "0x99Cd9cA83277338583F40d6b689c0aA5E20baCAD"
  TokenBytecode: ""

# S3/OSS配置
Storage:
  Type: s3
  Bucket: coinroll-assets
  Region: ap-southeast-1
  AccessKey: ""
  SecretKey: ""
  Endpoint: ""
  CDNDomain: https://assets.coinroll.io

# 签名私钥 (用于生成合约签名) - 生产环境使用环境变量
SignerPrivateKey: "${SIGNER_PRIVATE_KEY}"

Cos:
  SecretID: "${TENCENT_CLOUD_SECRET_ID}"
  SecretKey: "${TENCENT_CLOUD_SECRET_KEY}"
  Bucket: "metaland-1389986750"
  Region: "ap-shanghai"
  AppID: "1389986750"
  Domain: "http://upload.metanode.tech"  # 自定义域名

  